  services:
    service-discovery:
      build:
        context: ../service-discovery
        dockerfile: Dockerfile
      hostname: service-discovery
      ports:
        - "8761:8761"
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    external-configuration:
      build:
        context: ../external-configuration
        dockerfile: Dockerfile
      hostname: config-server
      ports:
        - "8888:8888"
      depends_on:
        - service-discovery
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
        interval: 30s
        timeout: 10s
        retries: 5
        start_period: 60s

    api-gateway:
      build:
        context: ../api-gateway
        dockerfile: Dockerfile
      hostname: api-gateway
      ports:
        - "8080:8080"
      environment:
        - SPRING_CLOUD_CONFIG_URI=http://external-configuration:8888
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka
      depends_on:
        service-discovery:
          condition: service_healthy
        external-configuration:
          condition: service_healthy
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    service-user:
      build:
        context: ../user-service
        dockerfile: service-user/Dockerfile
      hostname: service-user
      ports:
        - "8081:8081"
      environment:
        - SPRING_CLOUD_CONFIG_URI=http://external-configuration:8888
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka
      depends_on:
        service-discovery:
          condition: service_healthy
        external-configuration:
          condition: service_healthy
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    service-notification:
      build:
        context: ../user-service
        dockerfile: service-notification/Dockerfile
      hostname: service-notification
      ports:
        - "8082:8082"
      environment:
        - SPRING_CLOUD_CONFIG_URI=http://external-configuration:8888
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka
        - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
        - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      depends_on:
        service-discovery:
          condition: service_healthy
        external-configuration:
          condition: service_healthy
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    postgres:
      image: postgres:latest
      container_name: user-service-postgresql
      environment:
        - POSTGRES_DB=user_service
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "pg_isready", "-U", "postgres" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    zookeeper:
      image: confluentinc/cp-zookeeper:latest
      container_name: zookeeper-container-pet
      environment:
        - ZOOKEEPER_CLIENT_PORT=2181
      ports:
        - "2181:2181"
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    kafka:
      image: confluentinc/cp-kafka:latest
      container_name: kafka-container-pet
      depends_on:
        zookeeper:
          condition: service_healthy
      ports:
        - "9092:9092"
      environment:
        - KAFKA_BROKER_ID=1
        - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
        - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
        - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      networks:
        - app-network
      healthcheck:
        test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    keycloak-postgres:
      image: postgres:latest
      container_name: keycloak-postgresql
      environment:
        POSTGRES_DB: keycloak
        POSTGRES_USER: keycloak
        POSTGRES_PASSWORD: keycloak
      ports:
        - "5433:5432"
      volumes:
        - keycloak_postgres_data:/var/lib/postgresql/data
      networks:
        - app-network
      healthcheck:
        test: ["CMD", "pg_isready", "-U", "keycloak"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s

    keycloak:
      image: quay.io/keycloak/keycloak:latest
      container_name: keycloak
      environment:
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: admin
        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
        KC_DB_USERNAME: keycloak
        KC_DB_PASSWORD: keycloak
        KC_HTTP_ENABLED: true
        KC_HOSTNAME: keycloak
        KC_HOSTNAME_STRICT: false
        KC_HOSTNAME_STRICT_HTTPS: false
        KC_HOSTNAME_URL: http://keycloak:8080
        KC_HOSTNAME_ADMIN_URL: http://localhost:8083
        KC_HOSTNAME_STRICT_BACKCHANNEL: false
        KC_HEALTH_ENABLED: true
      ports:
        - "8083:8080"
      depends_on:
        keycloak-postgres:
          condition: service_healthy
      networks:
        - app-network
      command: start-dev

  volumes:
    postgres_data:
    keycloak_postgres_data:
  networks:
    app-network:
      driver: bridge